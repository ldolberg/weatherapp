services:
  web:
    build: .
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      WEATHER_CRON_ENABLED: "true"
      WEATHER_CRON: "*/5 * * * *"
    # Set DATABASE_URL in a project-root .env file (Supabase transaction pooler, port 6543).
